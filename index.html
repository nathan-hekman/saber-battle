<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Saber Battle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap">
  <link rel="stylesheet" href="style.css">

  <!-- PeerJS for WebRTC matchmaking (CDN, no install needed) -->
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="cursor"></div>

<!-- ── MAIN MENU ─────────────────────────────────────── -->
<div id="menu" class="overlay">
  <div class="panel">
    <div class="logo-wrap">
      <!-- Shows image logo if generated, else text fallback -->
      <img id="logo-img" src="assets/logo/logo-final.png" onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='block'">
      <div id="logo-fallback" style="display:none">
        <div class="logo-text">SABER<br>BATTLE</div>
      </div>
    </div>
    <div class="tagline">Master the blade. Destroy your enemy.</div>

    <div class="slider-row">
      <label>DIFFICULTY</label>
      <input type="range" id="difficulty" min="1" max="10" value="5">
      <label id="diff-label" style="text-align:right;color:#fff;min-width:40px">5</label>
    </div>

    <button class="btn btn-primary" id="btn-ai">⚔ FIGHT AI</button>
    <button class="btn btn-secondary" id="btn-online">⚡ ONLINE BATTLE</button>
  </div>
</div>

<!-- ── ONLINE LOBBY ──────────────────────────────────── -->
<div id="lobby" class="overlay hidden">
  <button class="back-btn" id="btn-back">← BACK</button>
  <div class="panel">
    <div class="logo-text" style="font-size:22px;margin-bottom:24px">ONLINE BATTLE</div>

    <!-- Tab row -->
    <div class="tabs">
      <button class="tab active" data-tab="friend">Friend Code</button>
      <button class="tab" data-tab="random">Random Match</button>
    </div>

    <!-- Friend code section -->
    <div id="tab-friend" class="section active">
      <button class="btn btn-primary" id="btn-create-room" style="margin-bottom:16px">CREATE ROOM</button>

      <div id="room-created" style="display:none">
        <div class="status-text">Share this code with your friend:</div>
        <div class="code-display" id="room-code">------</div>
        <div class="spinner" id="waiting-spinner"></div>
        <div class="status-text" id="waiting-status">Waiting for opponent…</div>
      </div>

      <div class="status-text" style="margin:8px 0">— or join with a code —</div>

      <input class="code-input" id="join-code" placeholder="ENTER CODE" maxlength="20">
      <button class="btn btn-secondary" id="btn-join">JOIN ROOM</button>
      <div class="status-text error" id="join-status"></div>
    </div>

    <!-- Random match section -->
    <div id="tab-random" class="section">
      <button class="btn btn-primary" id="btn-random-match">FIND OPPONENT</button>
      <div class="spinner" id="random-spinner" style="display:none;margin-top:24px"></div>
      <div class="status-text" id="random-status"></div>
    </div>
  </div>
</div>

<!-- ── COUNTDOWN ─────────────────────────────────────── -->
<div id="countdown-overlay" class="overlay hidden">
  <div style="font-size:clamp(80px,15vw,160px);font-weight:900;
              background:linear-gradient(135deg,#00aaff,#aa44ff);
              -webkit-background-clip:text;-webkit-text-fill-color:transparent;
              background-clip:text;" id="countdown-num">3</div>
</div>

<script type="module">
import { Game } from './js/game.js';
import { NetworkManager, MSG } from './js/network.js';

// ── Cursor ──────────────────────────────────────────────
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});

// ── Difficulty slider ────────────────────────────────────
const diffSlider = document.getElementById('difficulty');
const diffLabel  = document.getElementById('diff-label');
diffSlider.addEventListener('input', () => {
  diffLabel.textContent = diffSlider.value;
});

// ── Tab switching ────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});

// ── Overlay helpers ──────────────────────────────────────
const show = id => document.getElementById(id).classList.remove('hidden');
const hide = id => document.getElementById(id).classList.add('hidden');

// ── Countdown → start game ───────────────────────────────
let currentGame = null;

async function countdown(fromNum = 3) {
  show('countdown-overlay');
  const el = document.getElementById('countdown-num');
  for (let n = fromNum; n >= 1; n--) {
    el.textContent = n;
    await new Promise(r => setTimeout(r, 900));
  }
  el.textContent = 'FIGHT!';
  await new Promise(r => setTimeout(r, 600));
  hide('countdown-overlay');
}

function startGame(mode) {
  const canvas = document.getElementById('canvas');
  if (currentGame) currentGame.stop();
  currentGame = new Game(canvas, mode);
  currentGame.setDifficulty(parseInt(diffSlider.value) / 10);
  currentGame.start();
}

// ── AI mode ──────────────────────────────────────────────
document.getElementById('btn-ai').addEventListener('click', async () => {
  hide('menu');
  await countdown();
  startGame('ai');
});

// ── Lobby ────────────────────────────────────────────────
document.getElementById('btn-online').addEventListener('click', () => {
  hide('menu');
  show('lobby');
});
document.getElementById('btn-back').addEventListener('click', () => {
  hide('lobby');
  show('menu');
});

// ── Create room ──────────────────────────────────────────
document.getElementById('btn-create-room').addEventListener('click', async () => {
  const net = new NetworkManager();
  document.getElementById('btn-create-room').disabled = true;

  try {
    const code = await net.host();
    document.getElementById('room-code').textContent = code;
    document.getElementById('room-created').style.display = 'block';

    net.addEventListener('connected', async () => {
      hide('lobby');
      await countdown();
      const canvas = document.getElementById('canvas');
      if (currentGame) currentGame.stop();
      currentGame = new Game(canvas, 'host');
      currentGame.net = net;
      currentGame._wireNetwork();
      currentGame.start();
    });
  } catch (e) {
    document.getElementById('join-status').textContent = 'Connection failed: ' + e.message;
  }
});

// ── Join room ────────────────────────────────────────────
document.getElementById('btn-join').addEventListener('click', async () => {
  const code = document.getElementById('join-code').value.trim();
  if (!code) return;
  const status = document.getElementById('join-status');
  status.textContent = 'Connecting…';
  status.className = 'status-text';

  const net = new NetworkManager();
  try {
    await net.join(code);
    status.textContent = 'Connected!';
    status.className = 'status-text success';
    hide('lobby');
    await countdown();
    const canvas = document.getElementById('canvas');
    if (currentGame) currentGame.stop();
    currentGame = new Game(canvas, 'guest');
    currentGame.net = net;
    currentGame._wireNetwork();
    currentGame.start();
  } catch (e) {
    status.textContent = 'Failed: ' + (e.message || 'Invalid code');
    status.className = 'status-text error';
  }
});

// ── Random match ─────────────────────────────────────────
document.getElementById('btn-random-match').addEventListener('click', async () => {
  const net = new NetworkManager();
  const spinner = document.getElementById('random-spinner');
  const status  = document.getElementById('random-status');
  spinner.style.display = 'block';
  status.textContent = 'Searching for opponent…';

  try {
    await net.matchRandom((id) => {
      status.textContent = 'Your ID: ' + id + '\nWaiting…';
    });
    net.addEventListener('connected', async () => {
      hide('lobby');
      await countdown();
      const canvas = document.getElementById('canvas');
      if (currentGame) currentGame.stop();
      currentGame = new Game(canvas, net.role);
      currentGame.net = net;
      currentGame._wireNetwork();
      currentGame.start();
    });
  } catch (e) {
    status.textContent = 'Error: ' + e.message;
    spinner.style.display = 'none';
  }
});
</script>
</body>
</html>
